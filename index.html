<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Library</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <h1>My Library</h1>
        <button id="add-book-button" command="show-modal" commandfor="add-book-modal">Add Book</button>
        <a class="header-link" href="https://github.com/MerlinDeadleft/odin-library" target="_blank">Github</a>
    </header>

    <main>
        <div class="book-card-container">
            <h2 id="empty-message">Your library is empty!<br>Add a book with the button in the top right corner!</h2>
        </div>
    </main>

    <dialog id="add-book-modal" closedby="any">
        <h2>Add new book to library</h2>
        <form id="add-book-form" method="dialog">
            <label for="title">Title:</label>
            <input type="text" name="title" id="title" required>
            <p>Author:</p>
            <label for="author-first-name">First Name:</label>
            <input type="text" name="author-first-name" id="author-first-name" required>
            <label for="author-last-name">Last Name:</label>
            <input type="text" name="author-last-name" id="author-last-name" required>
            <label for="pages">Pages:</label>
            <input type="number" name="pages" id="pages" min="1" value="1" required>
            <label for="status">Status:</label>
            <select name="status" id="status" required>
                <option value="PlanToRead" selected>Plan To Read</option>
                <option value="Reading">Reading</option>
                <option value="Finished">Finished</option>
            </select>
        </form>
            <button form="add-book-form">Add Book</button>
            <button type="button" command="close" commandfor="add-book-modal">Cancel</button>
    </dialog>

    <dialog id="confirm-remove-modal" closedby="any">
        <h3>Do you really want to remove <span id="remove-modal-book-title">"Title"</span> from the library?</h3>
        <div class="confirm-button-container">
            <button type="button" id="confirm-remove-button">Yes</button>
            <button type="button" command="close" commandfor="confirm-remove-modal">No</button>
        </div>
    </dialog>

    <script src="scripts/main.js"></script>
</body>
</html>
